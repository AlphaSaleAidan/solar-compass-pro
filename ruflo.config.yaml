name: alpha-sale-pro
version: "1.0.0"
description: AI Council agents for Alpha Sale Pro solar operations platform

agents:
  - name: ui-inspector
    role: >
      Scans alphasalepro.com frontend for visual bugs, broken layouts,
      missing error states, accessibility issues, and UX problems.
      Reports findings in a structured list with file and line number.
    focus:
      - src/components/
      - src/pages/
    model: claude-haiku-4-5-20251001
    maxTokens: 1000

  - name: code-auditor
    role: >
      Scans for TypeScript errors, security issues, dead code, performance
      problems, and architectural concerns across frontend and backend.
    focus:
      - src/
      - server/src/
    model: claude-haiku-4-5-20251001
    maxTokens: 1000

  - name: backend-operator
    role: >
      Monitors Supabase schema, RLS policies, API routes, data integrity,
      and server health. Checks for missing indexes, policy gaps, and
      data consistency issues.
    focus:
      - supabase/
      - server/src/routes/
      - server/src/config/
    model: claude-haiku-4-5-20251001
    maxTokens: 1000

  - name: user-comms
    role: >
      Answers user questions about the Alpha Sale Pro platform, solar
      installation process, deal status, milestones, and project details
      with up-to-date context from Supabase.
    focus:
      - src/contexts/
      - src/data/
    model: claude-haiku-4-5-20251001
    maxTokens: 1000
    dataAccess:
      - projects
      - sell_projects
      - milestone_states

  - name: code-repair
    role: >
      Reads findings from UI Inspector and Code Auditor, then automatically
      fixes each issue — broken imports, missing null checks, layout bugs,
      TypeScript errors. Commits changes with descriptive messages.
    focus:
      - src/
    model: claude-haiku-4-5-20251001
    maxTokens: 1000
    dependsOn:
      - ui-inspector
      - code-auditor

# ─── SOP Guardian Swarm ─────────────────────────────────────

guardians:
  - name: lead-gatekeeper
    rule: Validates leads before conversion — credit check, Aurora sync, required fields
    checks: [LG-001, LG-002, LG-003, LG-004, LG-005]
    tables: [sell_projects]

  - name: qc-inspector
    rule: Enforces clean/dirty gate — SLA timing, rejection notes, document signing
    checks: [QC-001, QC-002, QC-003]
    tables: [sell_projects]

  - name: milestone-sequencer
    rule: Guards M1→M7 sequential progression — no skips, no unapproved advances
    checks: [MS-001, MS-002, MS-003]
    tables: [projects, milestone_states]

  - name: fund-controller
    rule: Validates fund release — ops approval, dual approval for >$10K, percentage limits
    checks: [FC-001, FC-002, FC-003]
    tables: [projects, milestone_states]

  - name: doc-auditor
    rule: Checks required document uploads per milestone before approval
    checks: [DA-001]
    tables: [projects, milestone_states]

  - name: data-integrity
    rule: Schema consistency — orphaned records, missing states, invalid milestone numbers
    checks: [DI-001, DI-002, DI-003]
    tables: [projects, sell_projects, milestone_states]

  - name: notification-enforcer
    rule: SLA timing — overdue reviews, speed bonus window, homeowner contact cadence
    checks: [NE-001, NE-002, NE-003]
    tables: [projects]

costControls:
  model: claude-haiku-4-5-20251001
  maxTokensPerResponse: 1000
  dailyCallsPerUser: 50
  usageTracking: supabase

gates:
  roles:
    - backend_ops
    - master
